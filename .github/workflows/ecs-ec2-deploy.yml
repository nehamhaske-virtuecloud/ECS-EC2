name: Build and Deploy Spring Boot App to ECS EC2

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REPO_URL: ${{ secrets.ECR_REPO_URL }}
      ECS_CLUSTER_NAME: ${{ secrets.ECS_CLUSTER_NAME }}
      ECS_SERVICE_NAME: ${{ secrets.ECS_SERVICE_NAME }}
      ECS_TASK_DEFINITION: ${{ secrets.ECS_TASK_DEFINITION }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Docker image
      run: |
        docker build -t $ECR_REPO_URL:latest .

    - name: Push image to Amazon ECR
      run: |
        docker push $ECR_REPO_URL:latest

    - name: Get current ECS task definition
      run: |
        aws ecs describe-task-definition \
          --task-definition $ECS_TASK_DEFINITION \
          --query taskDefinition \
          --output json > base-task-def.json

    - name: Generate new ECS task definition with updated image
      run: |
        cat base-task-def.json | \
        jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' | \
        jq --arg IMAGE "$ECR_REPO_URL:latest" '.containerDefinitions[0].image = $IMAGE' \
        > new-task-def.json

    - name: Debug new task definition
      run: |
        echo "====== New ECS Task Definition ======"
        cat new-task-def.json
        echo "====================================="

    - name: Register new ECS task definition revision
      run: |
        aws ecs register-task-definition \
          --cli-input-json file://new-task-def.json

    - name: Update ECS service with new task revision
      run: |
        new_revision=$(aws ecs describe-task-definition \
          --task-definition $ECS_TASK_DEFINITION \
          --query "taskDefinition.revision" \
          --output text)

        aws ecs update-service \
          --cluster $ECS_CLUSTER_NAME \
          --service $ECS_SERVICE_NAME \
          --task-definition $ECS_TASK_DEFINITION:$new_revision
